<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Developer Tools v1.1.2</title>
  <meta name="theme-color" content="#12395a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="开发工具箱" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <link rel="icon" href="assets/icons/favicon.svg" type="image/svg+xml" />
  <link rel="icon" href="assets/icons/favicon-32x32.png" sizes="32x32" type="image/png" />
  <link rel="icon" href="assets/icons/favicon-16x16.png" sizes="16x16" type="image/png" />
  <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png" sizes="180x180" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <div class="brand-logo"><img class="brand-logo-img" src="assets/icons/icon-192.png" alt="" /></div>
        <div class="brand-main">
          <div class="brand-title-line">
            <span class="brand-title" data-i18n="appTitle">开发工具箱</span>
            <span class="version-badge" id="appVersion">v1.1.2</span>
          </div>
        </div>
      </div>
      <nav class="tool-menu" id="toolMenu"></nav>
    </aside>

    <main class="main">
      <header class="topbar">
        <button class="icon-btn mobile-only" id="menuToggle" type="button" aria-label="Menu">☰</button>
        <div class="topbar-title" id="currentToolTitle" data-i18n="appTitle">开发工具箱</div>
        <div class="topbar-actions">
          <select id="langSelect" class="lang-select" aria-label="Language">
            <option value="zh">中文</option>
            <option value="en">English</option>
          </select>
        </div>
      </header>

      <section class="content" id="content"></section>
    </main>
  </div>

  <div class="overlay" id="overlay"></div>
  <div class="toast" id="toast"></div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/js-beautify/1.15.1/beautifier.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/js-beautify/1.15.1/beautify-css.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/js-beautify/1.15.1/beautify-html.min.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
